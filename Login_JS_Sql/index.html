<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <style>
        body{
          background-color: rgb(217, 217, 217);
          display: flex;
          flex-direction: column;
          align-items: center;
        }
        input{
            height: 20px;
            transition: all 0.3s ease-in-out;
            border: 1px solid black;
            border-radius: 3px;
            width: 200px;  
        }
        input:hover{
            transform: scale(1.1);
        }
        label{
            width: 200px;
            font-size: 20px;
            margin-top: 20px;
        }
        form{
          background-color: rgb(255, 255, 255);
          border-radius: 20px;
          width: 343px;
          height: 428px;
          box-shadow: 0 4px 8px rgba(50,50,93,0.10);
          display: flex; 
          flex-direction: column;
          align-items: center; 
        }

        button{
            box-shadow: 0 4px 8px rgba(50,50,93,1);
            transition: all 0.3s ease-in-out;
            width: 200px;
            border-radius: 10px;
            color: white;
            font-size: 20px;
            border: none;
            background-color: blue;
            margin-top: 50px;
        }
        button:hover{
            transform: scale(1.1);
        }
        h3{
          font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        }
        .card-container{
            width: 100%;
            height: 879px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .outcss{
            width: 200px;
            height: 30px;
            background-color: white;
            margin-top: 10px;
            border: 1px solid black;
        }
    </style>
    <div class="card-container">
    <form id="userFromJS" class="auth" action="/singup" metod="post">
        <h3 class="auth_title">Регестрация</h3>
        <label class="auth_label">
            <input class="auth_input" name="name" type="text" placeholder="Ваше имя" required="">
        </label>
        <label class="auth_label">
            <input class="auth_input" name="email" type="email" placeholder="your@mail.com" required="">
        </label>
        <label class="auth_label">
            <input class="auth_input" name="password" type="password" placeholder="......" required="">
        </label>
        <label class="auth_label">
            <input class="auth_input" style="width: 200px; border-radius: 3px;" name="date" type="date" required="">
        </label>
        <label class="auth_label">
            <input class="auth_input" min="1" style="width: 200px; border-radius: 3px;" name="id" type="number" placeholder="Какой id?" required="">
        </label>
        <div id="outJS" class="outcss"></div>
        <button class="auth_btn" type="submit">Создать</button>
    </form>
    </div>
    <script>
       const form = document.getElementById("userFromJS");
       const out = document.getElementById("outJS");

       from.addEventListener("submit", async (e) => {
        e.preventDefault();
        
        const fd = new FormData(form);
        const payload = {
            name: fd.get("name"),
            email: fd.get("email"),
            password: fd.get("password"),
            date: fd.get("date"),
            id: Number(fd.get("id"))
        }

        const r = await fetch("localhost:5000/api/users", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
        });

        out.textContent = `HTTP ${r.status} \n ${await r.text()}`;
       });
    </script>
</body>
</html>
